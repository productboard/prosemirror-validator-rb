plugins:
  - rubocop-rake

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3

Metrics/AbcSize:
  Max: 40

Metrics/ClassLength:
  Max: 170

Metrics/ModuleLength:
  Max: 120

Metrics/ParameterLists:
  Max: 7

Metrics/CyclomaticComplexity:
  Max: 12

Metrics/MethodLength:
  Max: 25

Metrics/PerceivedComplexity:
  Max: 13

Style/Documentation:
  Enabled: false
