name: Pull Request

on:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-lint:
    name: Tests and linter
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5.0.1

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1.307.0
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run tests and linter
        run: bundle exec rake
